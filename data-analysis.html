<!DOCTYPE html>
<html lang="en" data-theme="forest" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eco:nection - Data Analysis</title>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full flex flex-col">
    <nav class="navbar bg-base-300">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <i class="ti ti-menu text-xl"></i>
                </div>
                <ul
                    tabindex="0"
                    class="menu menu-sm dropdown-content gap-y-3 bg-base-300 rounded-box z-10 mt-3 w-44 shadow">
                    <li>
                        <a class="btn btn-primary" href="index.html">
                            <i class="ti ti-map-2 text-xl"></i>
                            <span>Map</span>
                        </a>
                    </li>
                    <li>
                        <a class="btn btn-primary" href="data-analysis.html">
                            <i class="ti ti-chart-dots-2 text-xl"></i>
                            <span>Data</span>
                        </a>
                    </li>
                    <div class="divider my-0"></div>
                    <li>
                        <a href="https://github.com/PeiaKassio/eco-nection" class="btn btn-outline btn-secondary lg:hidden">
                            <i class="ti ti-brand-github text-xl"></i>
                            Contribute
                        </a>
                    </li>
                </ul>
            </div>
            <div class="flex mx-3 gap-3 justify-center hidden lg:flex">
                <i class="ti ti-affiliate text-3xl text-primary"></i>
                <span class="text-2xl subpixel-antialiased">eco:nection</span>
            </div>
        </div>
        <div class="navbar-center">
            <div class="flex mx-3 gap-3 justify-center lg:hidden">
                <i class="ti ti-affiliate text-3xl text-primary"></i>
                <span class="text-2xl subpixel-antialiased">eco:nection</span>
            </div>
            <ul class="hidden lg:flex menu menu-horizontal px-1 gap-x-12">
                <li>
                    <a class="btn btn-primary" href="index.html">
                        <i class="ti ti-map-2 text-xl"></i>
                        Map
                    </a>
                </li>
                <li>
                    <a class="btn btn-primary" href="data-analysis.html">
                        <i class="ti ti-chart-dots-2 text-xl"></i>
                        Data
                    </a>
                </li>
            </ul>
        </div>
        <div class="navbar-end">
            <a href="https://github.com/PeiaKassio/eco-nection" class="btn btn-outline btn-secondary hidden lg:flex">
                <i class="ti ti-brand-github text-xl"></i>
                Contribute
            </a>
        </div>
    </nav>

    <main class="lg:container m-3 lg:mt-12 lg:mx-auto lg:px-32">
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Sidebar for desktop -->
            <div class="hidden lg:flex flex-col bg-base-200 p-4 rounded-box w-1/4 h-full sidebar">
                <h2 class="text-2xl font-bold mb-4">Filter by Country</h2>
                <input
                    type="text"
                    id="countrySearch"
                    placeholder="Search countries..."
                    class="input input-bordered w-full mb-4"
                    onkeyup="filterCountries()"
                >
                <select
                    id="countrySelect"
                    multiple
                    class="select select-bordered w-full h-60 overflow-y-scroll"
                ></select>
                <button
                    id="applyCountryFilter"
                    class="btn btn-primary w-full mt-4"
                >
                    Apply Filter
                </button>
            </div>

            <!-- Chart Area -->
            <div class="chart-area flex-grow bg-base-100 rounded-box p-6">
                <h2 class="text-2xl font-bold mb-4">Topics by Country</h2>
                <div class="chart-container" style="overflow-x: auto; width: 100%; max-width: 100%;">
                    <canvas id="countryChart" style="min-width: 800px;"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/data-analysis.js"></script>
</body>
</html>
